    <title>Trendradar KI & Automatisierung</title>

    <!--*********** STYLING ******************* -->
    <style>
      .bubble {
        transform-box: fill-box;
        transform-origin: center;
        animation: pulse 4s ease-in-out infinite;
        transition:
          transform 0.3s ease,
          filter 0.3s ease; /* smooth transition for both scale and glow */
        cursor: pointer;
      }

      @keyframes pulse {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.2);
        }
        100% {
          transform: scale(1);
        }
      }

      .bubble:nth-of-type(2n) {
        animation-delay: 0.6s;
      }
      .bubble:nth-of-type(3n) {
        animation-delay: 1.6s;
      }
      .bubble:nth-of-type(5n) {
        animation-delay: 1s;
      }
      .bubble:hover {
        transform: scale(1.12); /* slightly bigger on hover */
      }
      .bubble-purple:hover {
        filter: drop-shadow(0 0 8px rgb(218, 183, 255));
      }
      .bubble-blue:hover {
        filter: drop-shadow(0 0 8px rgb(152, 182, 253));
      }
      .bubble-pink:hover {
        filter: drop-shadow(0 0 8px rgb(255, 199, 234));
      }
      .bubble-cyan:hover {
        filter: drop-shadow(0 0 8px rgb(133, 249, 255));
      }

      /* ===== TOOLTIP ===== */
      #tooltip {
        position: fixed;
        padding: 0.4em 1em;
        background: rgb(255, 255, 255);
        color: #000000;
        font-size: clamp(12px, 1.4vw, 60px);
        font-family: "Open Sans", sans-serif;
        border-radius: 100px;
        pointer-events: none;
        white-space: nowrap;
        opacity: 0;
        transform: translateY(6px);
        transition:
          opacity 0.2s ease,
          transform 0.2s ease;
        z-index: 9999;
      }

      #tooltip.visible {
        opacity: 1;
        transform: translateY(0);
      }
    </style>

    <!-- ===== TOOLTIP ===== -->
    <div id="tooltip"></div>

    <!-- ===== JAVASCRIPT ===== -->
    <script>
      const tooltip = document.getElementById("tooltip");

      document.querySelectorAll(".bubble").forEach((circle) => {
        circle.addEventListener("mouseenter", (e) => {
          tooltip.textContent = circle.dataset.tooltip;
          tooltip.classList.add("visible");
        });

        circle.addEventListener("mousemove", (e) => {
          tooltip.style.left = e.clientX + 12 + "px";
          tooltip.style.top = e.clientY + 12 + "px";
        });

        circle.addEventListener("mouseleave", () => {
          tooltip.classList.remove("visible");
        });

        circle.addEventListener("click", () => {
          if (circle.dataset.link) {
            window.open(circle.dataset.link, "_blank");
          }
        });
      });
    </script>
